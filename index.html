<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다산북스 시설관리 시스템</title>
  <link rel="stylesheet" href="스타일.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <strong>다산북스</strong>
        <span>시설관리 시스템</span>
        <small>인사총무팀</small>
      </div>

      <nav>
        <button class="nav active" data-page="dashboard">🏠 대시보드</button>
        <button class="nav" data-page="register">📝 점검 등록</button>
        <button class="nav" data-page="history">📋 점검 이력</button>
      </nav>

      <div class="user">
        김주림 <span>관리자</span><br>
        <small>본사</small>
      </div>
    </aside>

    <main class="main">
      <section id="dashboard" class="page active">
        <header>
          <h1>대시보드</h1>
          <p>시설 점검 현황을 한눈에 확인하세요.</p>
        </header>

        <div class="stats">
          <div class="stat">
            <span>이번 달 점검</span>
            <strong id="monthCount">0</strong>
          </div>
          <div class="stat danger">
            <span>미처리 수리</span>
            <strong id="openRepairs">0</strong>
          </div>
          <div class="stat warn">
            <span>긴급 수리</span>
            <strong id="urgentCount">0</strong>
          </div>
          <div class="stat">
            <span>최근 점검일</span>
            <strong id="lastDate">-</strong>
          </div>
        </div>

        <h2>건물별 현황</h2>
        <div id="buildingCards" class="cards"></div>

        <h2>최근 점검 내역</h2>
        <div id="recentList" class="list"></div>
      </section>

      <section id="register" class="page">
        <header>
          <h1>점검 등록</h1>
          <p>시설 점검 내용을 기록합니다.</p>
        </header>

        <form id="inspectionForm" class="form">
          <label>건물명
            <select name="building" required>
              <option>본사</option>
              <option>물류센터1</option>
              <option>물류센터2</option>
              <option>서교동</option>
            </select>
          </label>

          <label>점검일
            <input type="date" name="date" required />
          </label>

          <label>점검자
            <input name="inspector" placeholder="예: 김주림" required />
          </label>

          <label>점검 구역
            <input name="area" placeholder="예: 3층 복도, 주차장, 옥상" required />
          </label>

          <label class="wide">점검 내용
            <textarea name="content" placeholder="점검 내용을 입력하세요" required></textarea>
          </label>

          <label>상태
            <select name="status" required>
              <option>이상 없음</option>
              <option>수리필요</option>
              <option>긴급</option>
            </select>
          </label>

          <label>첨부파일
            <input type="file" name="photo" accept="image/*,.pdf" />
          </label>

          <label class="wide">비고
            <textarea name="memo" placeholder="추가 메모"></textarea>
          </label>

          <button class="primary" type="submit">등록하기</button>
        </form>
      </section>

      <section id="history" class="page">
        <header>
          <h1>점검 이력</h1>
          <p>등록된 점검 내역을 확인합니다.</p>
        </header>

        <div class="filters">
          <select id="filterBuilding">
            <option value="">전체 건물</option>
            <option>본사</option>
            <option>물류센터1</option>
            <option>물류센터2</option>
            <option>서교동</option>
          </select>

          <select id="filterStatus">
            <option value="">전체 상태</option>
            <option>이상 없음</option>
            <option>수리필요</option>
            <option>긴급</option>
          </select>

          <input id="filterInspector" placeholder="점검자 검색" />
          <button id="exportCsv">엑셀용 CSV 다운로드</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>건물</th>
              <th>점검일</th>
              <th>점검자</th>
              <th>구역</th>
              <th>점검 내용</th>
              <th>비고</th>
              <th>상태</th>
              <th>처리</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
